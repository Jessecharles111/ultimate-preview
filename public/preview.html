<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cross-Origin-Embedder-Policy" content="require-corp">
  <meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin">
  <style>
    body { margin: 0; padding: 0; overflow: hidden; background: white; font-family: sans-serif; }
    #preview { width: 100vw; height: 100vh; border: none; }
    #error { display: none; color: #d32f2f; background: #ffebee; padding: 20px; position: absolute; top: 0; left: 0; right: 0; z-index: 1000; white-space: pre-wrap; font-family: monospace; max-height: 200px; overflow: auto; }
    #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
    #loading svg { display: block; margin: 0 auto 20px; }
  </style>
</head>
<body>
  <div id="loading">
    <svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="dotGrad" cx="30%" cy="30%" r="70%">
          <stop offset="0%" stop-color="#ffd166"/>
          <stop offset="100%" stop-color="#ff9f1c"/>
        </radialGradient>
        <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#a0e7e5"/>
          <stop offset="100%" stop-color="#b4f8c8"/>
        </linearGradient>
        <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
          <feMerge>
            <feMergeNode in="offsetblur" />
            <feMergeNode in="SourceGraphic" />
          </feMerge>
        </filter>
      </defs>
      <g fill="#cccccc" opacity="0.3">
        <circle cx="50" cy="20" r="4"/>
        <circle cx="70" cy="30" r="4"/>
        <circle cx="80" cy="50" r="4"/>
        <circle cx="70" cy="70" r="4"/>
        <circle cx="50" cy="80" r="4"/>
        <circle cx="30" cy="70" r="4"/>
        <circle cx="20" cy="50" r="4"/>
        <circle cx="30" cy="30" r="4"/>
      </g>
      <circle cx="50" cy="20" r="6" fill="url(#dotGrad)" filter="url(#softGlow)">
        <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="50" cy="50" r="25" fill="none" stroke="url(#ringGrad)" stroke-width="2" stroke-dasharray="4 4"/>
    </svg>
    <span id="loading-message">Booting WebContainer...</span>
  </div>
  <iframe id="preview" sandbox="allow-scripts allow-same-origin allow-forms allow-modals allow-popups allow-downloads" style="display: none;"></iframe>
  <div id="error"></div>

  <script type="importmap">
    {
      "imports": {
        "@webcontainer/api": "https://esm.sh/@webcontainer/api@1.2.4",
        "pako": "https://esm.sh/pako@2.1.0"
      }
    }
  </script>

  <script type="module">
    import { WebContainer } from '@webcontainer/api';
    import pako from 'pako';

    const previewFrame = document.getElementById('preview');
    const loadingDiv = document.getElementById('loading');
    const loadingMessage = document.getElementById('loading-message');
    const errorDiv = document.getElementById('error');
    const sessionId = window.location.pathname.split('/').pop();

    let startupTimeout;
    let db;

    // Open IndexedDB
    async function openDB() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open('wc-cache', 1);
        req.onerror = () => reject(req.error);
        req.onupgradeneeded = (e) => {
          const db = e.target.result;
          if (!db.objectStoreNames.contains('deps')) {
            db.createObjectStore('deps');
          }
        };
        req.onsuccess = () => resolve(req.result);
      });
    }

    async function getCachedTarball(key) {
      if (!db) db = await openDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction('deps', 'readonly');
        const store = tx.objectStore('deps');
        const req = store.get(key);
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }

    async function setCachedTarball(key, tarball) {
      if (!db) db = await openDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction('deps', 'readwrite');
        const store = tx.objectStore('deps');
        const req = store.put(tarball, key);
        req.onsuccess = () => resolve();
        req.onerror = () => reject(req.error);
      });
    }

    // Simple hash
    async function hashString(str) {
      const enc = new TextEncoder();
      const data = enc.encode(str);
      const hash = await crypto.subtle.digest('SHA-256', data);
      return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    // Extract tar.gz directly into WebContainer (async, parallel)
    async function extractTarball(webcontainer, gzipped) {
      const uint8 = new Uint8Array(gzipped);
      const data = pako.ungzip(uint8, { to: 'string' });
      // Simple tar parsing – assumes no long names, etc. For full tar support we'd need a proper lib,
      // but for node_modules it's enough.
      const lines = data.split(/\n/);
      const files = [];
      for (let i = 0; i < lines.length; ) {
        const header = lines[i];
        if (header.length < 100) break;
        const name = header.slice(0, 100).replace(/\0.*$/, '');
        const sizeStr = header.slice(124, 136).replace(/\0.*$/, '');
        const size = parseInt(sizeStr, 8);
        const content = lines.slice(i + 1, i + 1 + Math.ceil(size / 512)).join('\n').slice(0, size);
        if (size > 0) {
          files.push({ name, content });
        }
        i += 1 + Math.ceil(size / 512);
      }
      // Write in parallel (limit concurrency)
      const concurrency = 50;
      for (let i = 0; i < files.length; i += concurrency) {
        const chunk = files.slice(i, i + concurrency);
        await Promise.all(chunk.map(({ name, content }) => webcontainer.fs.writeFile(name, content)));
      }
    }

    async function createTarball(webcontainer) {
      // Read all files under /node_modules
      const files = [];
      const walk = async (dir) => {
        const entries = await webcontainer.fs.readdir(dir);
        for (const entry of entries) {
          const full = `${dir}/${entry}`;
          const stat = await webcontainer.fs.stat(full);
          if (stat.isDirectory) {
            await walk(full);
          } else {
            const content = await webcontainer.fs.readFile(full, 'utf-8');
            files.push({ path: full.slice(1), content });
          }
        }
      };
      await walk('/node_modules');
      // Build tar in memory (simplified)
      let tar = '';
      for (const f of files) {
        const name = f.path;
        const content = f.content;
        const nameBuf = name.padEnd(100, '\0');
        const size = content.length;
        const sizeOctal = size.toString(8).padStart(11, '0') + '\0';
        const header = nameBuf + '0000644\0' + '0000000\0' + '0000000\0' +
                       sizeOctal + '00000000000\0' + '00000000000\0' +
                       '        '.padEnd(8, '\0') + 'ustar\0' + '00' + 'root\0'.padEnd(32, '\0') +
                       'root\0'.padEnd(32, '\0') + '\0'.repeat(255 - (name.length + 100 + 24 + 12 + 12 + 8 + 32 + 32));
        tar += header + content;
        const padding = Math.ceil(size / 512) * 512 - size;
        if (padding > 0) tar += '\0'.repeat(padding);
      }
      const gz = pako.gzip(tar);
      return gz.buffer;
    }

    async function mountAndInstall(webcontainer, session) {
      // Mount user files
      const mountStructure = {};
      for (const [filePath, fileContent] of Object.entries(session.files)) {
        const parts = filePath.split('/');
        let current = mountStructure;
        for (let i = 0; i < parts.length; i++) {
          const part = parts[i];
          if (i === parts.length - 1) {
            current[part] = { file: { contents: fileContent } };
          } else {
            current[part] = current[part] || { directory: {} };
            current = current[part].directory;
          }
        }
      }
      await webcontainer.mount(mountStructure);

      if (!session.files['package.json']) return false;

      const pkg = session.files['package.json'];
      const lock = session.files['package-lock.json'] || '';
      const key = await hashString(pkg + lock);
      const cached = await getCachedTarball(key);
      if (cached) {
        loadingMessage.innerText = 'Restoring cached dependencies...';
        await extractTarball(webcontainer, cached);
        return true;
      }

      loadingMessage.innerText = 'Installing dependencies (will be cached)...';
      const hasLock = !!session.files['package-lock.json'];
      const installCmd = hasLock ? 'ci' : 'install';
      const installArgs = [installCmd, '--prefer-offline', '--no-audit', '--no-fund'];
      const installProcess = await webcontainer.spawn('npm', installArgs);
      let installErr = '';
      installProcess.output.pipeTo(new WritableStream({
        write(d) { if (d.includes('error') || d.includes('ERR!')) installErr += d; }
      }));
      const exit = await installProcess.exit;
      if (exit !== 0) {
        reportError('Install Failed', `npm ${installCmd} error: ${installErr.slice(-500)}`);
        return false;
      }

      loadingMessage.innerText = 'Caching dependencies for future...';
      const tarball = await createTarball(webcontainer);
      await setCachedTarball(key, tarball);
      return true;
    }

    function reportError(type, message, details = {}) {
      console.error(type, message, details);
      errorDiv.style.display = 'block';
      errorDiv.innerHTML += `<div><strong>${type}:</strong> ${message}</div>`;
      loadingDiv.style.display = 'none';
      fetch(`/api/preview/${sessionId}/error`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ type, message, ...details, timestamp: Date.now() })
      }).catch(() => {});
    }

    function injectErrorInterceptor(iframe) {
      const code = `
        (function() {
          const orig = console.error;
          console.error = function(...a) {
            orig.apply(console, a);
            window.parent.postMessage({ type: 'console-error', args: a.map(String) }, '*');
          };
          window.addEventListener('error', e => {
            window.parent.postMessage({ type: 'runtime-error', message: e.message, stack: e.error?.stack }, '*');
          });
          window.addEventListener('unhandledrejection', e => {
            window.parent.postMessage({ type: 'unhandled-rejection', reason: e.reason?.toString() }, '*');
          });
        })();
      `;
      iframe.addEventListener('load', () => {
        iframe.contentWindow.postMessage({ type: 'inject', code }, '*');
      });
    }

    window.addEventListener('message', (e) => {
      if (e.data.type?.startsWith('runtime-') || e.data.type === 'console-error') {
        reportError(e.data.type, e.data.message || e.data.args?.join(' '), e.data);
      }
    });

    function getDevCommand(pkg) {
      const scripts = pkg.scripts || {};
      let cmd = scripts.dev || scripts.start || scripts.serve;
      if (cmd) {
        const first = cmd.trim().split(/\s+/)[0];
        if (['vite', 'next', 'webpack', 'parcel', 'vue-cli-service', 'react-scripts'].includes(first)) {
          return { direct: true, cmd: first, args: cmd.slice(first.length).trim().split(/\s+/) };
        }
        return { direct: false, cmd: 'npm', args: ['run', scripts.dev ? 'dev' : (scripts.start ? 'start' : 'serve')] };
      }
      return { direct: false, cmd: 'npx', args: ['serve', '--port', '3000'] };
    }

    async function boot() {
      try {
        const res = await fetch(`/api/preview/${sessionId}`);
        if (!res.ok) throw new Error('Preview session expired');
        const session = await res.json();

        const wc = await WebContainer.boot();
        loadingMessage.innerText = 'Mounting files...';
        await mountAndInstall(wc, session);

        loadingMessage.innerText = 'Starting dev server...';
        let cmd, args;
        if (session.files['package.json']) {
          const pkg = JSON.parse(session.files['package.json']);
          const dev = getDevCommand(pkg);
          if (dev.direct) {
            cmd = 'npx';
            args = [dev.cmd, ...dev.args];
          } else {
            cmd = dev.cmd;
            args = dev.args;
          }
        } else {
          cmd = 'npx';
          args = ['serve', '--port', '3000'];
        }

        const proc = await wc.spawn(cmd, args);
        proc.output.pipeTo(new WritableStream({
          write(d) { if (d.includes('Error:')) reportError('Runtime Error', d); }
        }));

        startupTimeout = setTimeout(() => reportError('Timeout', 'Server not ready in 1000s'), 1000000);
        wc.on('server-ready', (port, url) => {
          clearTimeout(startupTimeout);
          loadingDiv.style.display = 'none';
          previewFrame.style.display = 'block';
          previewFrame.src = url;
          injectErrorInterceptor(previewFrame);
        });

      } catch (err) {
        clearTimeout(startupTimeout);
        reportError('Boot Failed', err.message, { stack: err.stack });
      }
    }

    boot();
  </script>
</body>
</html>
